name: Nuxt CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nuxt:
    name: Nuxt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repo
        uses: actions/checkout@v5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - name: Install Dependencies
        run: vp i --frozen-lockfile -- --trust-lockfile

      - name: Prepare Nuxt
        run: vpr nuxt:postinstall

      - name: Format Nuxt
        run: vpr nuxt:fmt

      - name: Lint Nuxt
        run: vpr nuxt:lint

      - name: Verify Nuxt Types
        run: vpr nuxt:typecheck

      - name: Test Nuxt
        run: vpr nuxt:test

      - name: Generate Nuxt Static Output
        run: vpr nuxt:generate
