name: Tauri CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri:
    name: Tauri
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Git Repo
        uses: actions/checkout@v5

      - name: Install Linux Tauri Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: vp i --frozen-lockfile -- --trust-lockfile

      - name: Format Tauri
        run: vpr tauri:fmt

      - name: Lint Tauri
        run: vpr tauri:lint

      - name: Test Tauri
        run: vpr tauri:test

      - name: Build Tauri Smoke Test
        run: vp exec tauri build --no-bundle
